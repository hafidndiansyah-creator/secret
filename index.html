<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Nata 💗</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(120deg,#ffc2d1,#ffe6f0,#ffd6e0);
font-family:Arial;
overflow:hidden;
}

/* hearts background */

.hearts{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
pointer-events:none;
}

.heart{
position:absolute;
color:#ff6f91;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh);opacity:0;}
30%{opacity:1;}
100%{transform:translateY(110vh);opacity:0;}
}

/* envelope */

.envelope{
width:70vw;
max-width:260px;
height:160px;
background:#ff6f91;
border-radius:14px;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-weight:bold;
cursor:pointer;
animation:shake 1.6s infinite;
z-index:2;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

@keyframes shake{
0%{transform:rotate(0)}
25%{transform:rotate(2deg)}
50%{transform:rotate(-2deg)}
75%{transform:rotate(2deg)}
100%{transform:rotate(0)}
}

/* letter */

.letter{
position:absolute;
width:88vw;
max-width:340px;
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 12px 30px rgba(0,0,0,0.2);
text-align:left;
display:none;
z-index:3;
animation:pop 0.5s;
}

@keyframes pop{
0%{transform:scale(0.8);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

/* photo top right */

.photo{
position:absolute;
top:-35px;
right:-20px;
}

.photo img{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:4px solid white;
box-shadow:0 0 15px rgba(255,79,129,0.6);
}

/* BIG photo animation */

.bigPhoto{
position:absolute;
top:-140px;
left:50%;
transform:translateX(-50%) scale(0);
transition:0.5s;
z-index:5;
}

.bigPhoto img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:5px solid white;
box-shadow:0 0 25px rgba(255,79,129,0.8);
}

.bigPhoto.show{
transform:translateX(-50%) scale(1);
}

/* text */

.name{
font-size:22px;
color:#ff4f81;
font-weight:bold;
margin-bottom:10px;
}

.text{
font-size:14px;
margin-top:8px;
color:#444;
opacity:0;
transition:0.5s;
}

/* button */

button{
margin-top:16px;
background:#ff4f81;
border:none;
color:white;
padding:10px 18px;
border-radius:12px;
cursor:pointer;
font-size:14px;
}

/* popup */

.popup{
position:fixed;
bottom:-200px;
left:50%;
transform:translateX(-50%);
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
width:80vw;
max-width:320px;
text-align:center;
transition:0.5s;
z-index:4;
}

.popup.show{
bottom:40px;
}

</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<div class="envelope" onclick="openLetter()">
tap me ✨
</div>

<div class="letter" id="letter">

<div class="photo">
<img src="Screenshot_20260228-184333.jpg">
</div>

<div class="bigPhoto" id="bigPhoto">
<img src="fbee645f1972b4a78fad8ec459dae04a.jpg">
</div>

<div class="name">HEIII NATAAA</div>

<p class="text">ngl meeting you was kinda random</p>
<p class="text">but now you're literally my favorite person</p>
<p class="text">life feels softer when you're around</p>
<p class="text" style="color:#ff4f81;font-weight:bold;">
i love you 💗
</p>

<button onclick="showLove()">press this ✨</button>

</div>

<div class="popup" id="popup">
<p>just a reminder:<br> you're my favorite person fr 💗</p>
</div>

<audio id="music" loop>
<source src="nothing.mp3" type="audio/mpeg">
</audio>

<script>

function openLetter(){

document.querySelector(".envelope").style.display="none";
document.getElementById("letter").style.display="block";

let texts=document.querySelectorAll(".text");

texts.forEach((t,i)=>{
setTimeout(()=>{
t.style.opacity=1;
},700*i);
});

document.getElementById("music").play();

}

function showLove(){

document.getElementById("popup").classList.add("show");
document.getElementById("bigPhoto").classList.add("show");

}

/* hearts */

setInterval(()=>{

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💗";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(18+Math.random()*25)+"px";
heart.style.animationDuration=(4+Math.random()*4)+"s";

document.getElementById("hearts").appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

},500);

</script>

</body>
</html>
