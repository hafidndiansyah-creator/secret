<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Nata 💗</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#ffd6e7,#f8cdda);

overflow:hidden;

}

/* hearts background */

.hearts{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
pointer-events:none;
}

.heart{
position:absolute;
font-size:20px;
animation:fall linear infinite;
opacity:0.7;
}

@keyframes fall{

0%{
transform:translateY(-10vh);
}

100%{
transform:translateY(110vh);
}

}

/* card */

.card{

position:relative;

width:90%;
max-width:340px;

background:white;

padding:28px;

border-radius:20px;

box-shadow:0 20px 40px rgba(0,0,0,0.15);

z-index:2;

}

/* photo heart shape */

.photo{

position:absolute;

top:-35px;
right:-10px;

width:90px;
height:90px;

}

.photo img{

width:100%;
height:100%;

object-fit:cover;

filter:drop-shadow(0 6px 12px rgba(0,0,0,0.25));

/* heart shape */

clip-path:path("M45 80 C10 55 0 35 0 20 C0 5 12 0 22 0 C33 0 45 10 45 10 C45 10 57 0 68 0 C78 0 90 5 90 20 C90 35 80 55 45 80 Z");

}

/* title */

.title{

font-size:22px;
font-weight:bold;
color:#ff4f81;

margin-bottom:10px;

}

/* text */

.text{

font-size:14px;
color:#444;

margin-top:8px;

opacity:0;

transition:0.6s;

}

.love{

margin-top:10px;

color:#ff4f81;
font-weight:bold;

}

/* button */

button{

margin-top:18px;

background:linear-gradient(135deg,#ff4f81,#ff6fa3);

border:none;

padding:12px 20px;

border-radius:12px;

color:white;

font-size:14px;

cursor:pointer;

box-shadow:0 8px 20px rgba(255,79,129,0.4);

}

/* popup */

.popup{

position:fixed;

bottom:-200px;

left:50%;

transform:translateX(-50%);

background:white;

padding:20px;

border-radius:16px;

width:80%;

max-width:320px;

text-align:center;

box-shadow:0 15px 30px rgba(0,0,0,0.2);

transition:0.5s;

}

.popup.show{
bottom:40px;
}

</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<div class="card">

<div class="photo">
<img src="Screenshot_20260228-184333.jpg">
</div>

<div class="title">
HELLOOO NATAAA
</div>

<p class="text">ngl meeting you was kinda random</p>
<p class="text">but now you're literally my favorite person</p>
<p class="text">life feels softer when you're around</p>
<p class="text love">i love you 💗</p>

<button onclick="showLove()">press this</button>

</div>

<div class="popup" id="popup">

just a reminder:<br>
you're my favorite person fr 💗

</div>

<audio id="music" autoplay loop>
<source src="nothing.mp3" type="audio/mpeg">
</audio>

<script>

/* text animation */

let texts=document.querySelectorAll(".text");

texts.forEach((t,i)=>{

setTimeout(()=>{
t.style.opacity=1;
},600*i);

});

/* popup */

function showLove(){

document.getElementById("popup").classList.add("show");

}

/* hearts background */

setInterval(()=>{

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💗";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(4+Math.random()*4)+"s";

document.getElementById("hearts").appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

},600);

</script>

</body>
</html>
